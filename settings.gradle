pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
        // JitPack for PdfBox-Android and other GitHub-based libraries
        maven { url 'https://jitpack.io' }
    }
}

rootProject.name = "proPDFEditor"
include ':app'
include ':core'
include ':viewer'
include ':editor'
include ':scanner'
include ':security'
include ':ads'
include ':ocr'
