// ============================================================
//  ProPDF Editor - app/build.gradle
//  All premium PDF features, FREE, Android 4.1+ (API 16)
// ============================================================
plugins {
    id 'com.android.application'
    id 'kotlin-android'
    id 'kotlin-kapt'
    id 'dagger.hilt.android.plugin'
}

android {
    compileSdk 34
    namespace 'com.propdf.editor'

    defaultConfig {
        applicationId "com.propdf.editor"
        minSdk 16                      // Android 4.1 Jelly Bean
        targetSdk 34                   // Android 14
        versionCode 1
        versionName "1.0.0"

        // Enable multidex for API < 21 (large dependency count)
        multiDexEnabled true

        // Vector drawable support for API 16+
        vectorDrawables.useSupportLibrary = true

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

        // Tesseract language data path
        buildConfigField "String", "TESS_DATA_PATH", '"tessdata"'

        // NDK for MuPDF JNI
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            applicationIdSuffix ".debug"
            debuggable true
        }
    }

    buildFeatures {
        viewBinding true
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        // Desugaring for API < 26 (java.time support)
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    packagingOptions {
        exclude 'META-INF/DEPENDENCIES'
        exclude 'META-INF/LICENSE'
        exclude 'META-INF/LICENSE.txt'
        exclude 'META-INF/NOTICE'
        exclude 'META-INF/NOTICE.txt'
        exclude 'META-INF/*.kotlin_module'
    }
}

dependencies {
    // ── Core Android ──────────────────────────────────────────
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    implementation 'androidx.viewpager2:viewpager2:1.0.0'
    implementation 'androidx.fragment:fragment-ktx:1.6.2'
    implementation 'androidx.activity:activity-ktx:1.8.2'

    // Multidex for API < 21
    implementation 'androidx.multidex:multidex:2.0.1'

    // Desugaring for Java 8+ on older APIs
    coreLibraryDesugaring 'com.android.tools.desugar_jdk_libs:desugar_jdk_libs:2.0.4'

    // ── Jetpack Architecture ──────────────────────────────────
    implementation 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-livedata-ktx:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
    implementation 'androidx.room:room-runtime:2.6.1'
    implementation 'androidx.room:room-ktx:2.6.1'
    kapt 'androidx.room:room-compiler:2.6.1'
    implementation 'androidx.datastore:datastore-preferences:1.0.0'
    implementation 'androidx.navigation:navigation-fragment-ktx:2.7.6'
    implementation 'androidx.navigation:navigation-ui-ktx:2.7.6'
    implementation 'androidx.work:work-runtime-ktx:2.9.0'

    // ── Dependency Injection ──────────────────────────────────
    implementation 'com.google.dagger:hilt-android:2.50'
    kapt 'com.google.dagger:hilt-compiler:2.50'
    implementation 'androidx.hilt:hilt-work:1.1.0'
    kapt 'androidx.hilt:hilt-compiler:1.1.0'

    // ── Coroutines ────────────────────────────────────────────
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-core:1.7.3'

    // ── PDF Core: MuPDF ───────────────────────────────────────
    // MuPDF: AGPL-3.0 (app must be open-source)
    implementation 'com.artifex.mupdf:viewer:1.23.3'

    // ── PDF Manipulation: iText 7 (AGPL-3.0) ─────────────────
    implementation 'com.itextpdf:itext7-core:7.2.5'
    implementation 'com.itextpdf:bouncy-castle-adapter:7.2.5'

    // ── PDF Operations: PDFBox-Android (Apache 2.0) ───────────
    implementation 'com.tom-roush:pdfbox-android:2.0.27.0'

    // ── OCR: Tesseract (Apache 2.0) ───────────────────────────
    implementation 'cz.adaptech.tesseract4android:tesseract4android:4.7.0'

    // ── Document Scanner: OpenCV (Apache 2.0) ─────────────────
    // Use CameraX for camera and OpenCV for processing
    implementation 'androidx.camera:camera-core:1.3.1'
    implementation 'androidx.camera:camera-camera2:1.3.1'
    implementation 'androidx.camera:camera-lifecycle:1.3.1'
    implementation 'androidx.camera:camera-view:1.3.1'

    // ── Image Loading ─────────────────────────────────────────
    implementation 'com.github.bumptech.glide:glide:4.16.0'
    kapt 'com.github.bumptech.glide:compiler:4.16.0'

    // ── AI / ML Kit (Free, requires Google Play) ──────────────
    implementation 'com.google.mlkit:text-recognition:16.0.0'
    implementation 'com.google.mlkit:translate:17.0.1'
    implementation 'com.google.mlkit:language-id:17.0.5'

    // ── Cloud Storage ─────────────────────────────────────────
    implementation 'com.google.android.gms:play-services-auth:21.0.0'
    implementation 'com.google.api-client:google-api-client-android:2.2.0'
    implementation 'com.google.apis:google-api-services-drive:v3-rev20231128-2.0.0'
    implementation 'com.dropbox.core:dropbox-core-sdk:6.0.0'

    // ── UI Components ─────────────────────────────────────────
    implementation 'com.github.chrisbanes:PhotoView:2.3.0'      // Zoomable image view
    implementation 'com.github.barteksc:android-pdf-viewer:3.2.0-beta.1' // Fallback PDF viewer
    implementation 'com.google.android.flexbox:flexbox:3.0.0'
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
    implementation 'com.github.skydoves:colorpickerview:2.3.0'  // Color picker for annotations

    // ── File Operations ───────────────────────────────────────
    implementation 'commons-io:commons-io:2.15.0'
    implementation 'org.apache.commons:commons-compress:1.25.0'

    // ── Security / Biometric ──────────────────────────────────
    implementation 'androidx.biometric:biometric:1.1.0'
    implementation 'androidx.security:security-crypto:1.1.0-alpha06'

    // ── Document Conversion (Office files) ────────────────────
    implementation 'org.apache.poi:poi:5.2.5'
    implementation 'org.apache.poi:poi-ooxml:5.2.5'

    // ── Networking (for cloud features) ───────────────────────
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'com.squareup.retrofit2:retrofit:2.9.0'
    implementation 'com.squareup.retrofit2:converter-gson:2.9.0'
    implementation 'com.google.code.gson:gson:2.10.1'

    // ── Testing ───────────────────────────────────────────────
    testImplementation 'junit:junit:4.13.2'
    testImplementation 'org.mockito:mockito-core:5.8.0'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}
