version: 2.1

orbs:
  android: circleci/android@2.5.0

commands:
  setup-java-17:
    steps:
      - run:
          name: Install OpenJDK 17
          command: |
            sudo apt-get update
            sudo apt-get install -y openjdk-17-jdk
            export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
            java -version

jobs:
  build-test-deploy:
    executor:
      name: android/android-machine
      tag: 2024.01.1
      resource-class: large
    steps:
      - checkout
      - setup-java-17
      - restore_cache:
          keys:
            - gradle-{{ checksum "gradle/wrapper/gradle-wrapper.properties" }}-{{ checksum "build.gradle" }}
            - gradle-
      - run:
          name: Grant execute permission for gradlew
          command: chmod +x gradlew
      - run:
          name: Clean Build
          command: |
            export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
            ./gradlew clean --no-daemon
      - run:
          name: Build Debug APK
          command: |
            export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
            ./gradlew :app:assembleDebug --stacktrace --no-daemon
          no_output_timeout: 20m
      - run:
          name: Run Unit Tests
          command: |
            export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
            ./gradlew testDebugUnitTest --no-daemon
          no_output_timeout: 15m
      - store_test_results:
          path: app/build/test-results
      - store_test_results:
          path: core/build/test-results
      - store_test_results:
          path: editor/build/test-results
      - store_test_results:
          path: viewer/build/test-results
      - store_test_results:
          path: scanner/build/test-results
      - store_test_results:
          path: security/build/test-results
      - store_artifacts:
          path: app/build/outputs/apk/debug
          destination: apk
      - save_cache:
          paths:
            - ~/.gradle/caches
            - ~/.gradle/wrapper
          key: gradle-{{ checksum "gradle/wrapper/gradle-wrapper.properties" }}-{{ checksum "build.gradle" }}

  build-only:
    executor:
      name: android/android-machine
      tag: 2024.01.1
      resource-class: large
    steps:
      - checkout
      - setup-java-17
      - restore_cache:
          keys:
            - gradle-{{ checksum "gradle/wrapper/gradle-wrapper.properties" }}-{{ checksum "build.gradle" }}
            - gradle-
      - run:
          name: Grant execute permission for gradlew
          command: chmod +x gradlew
      - run:
          name: Clean Build
          command: |
            export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
            ./gradlew clean --no-daemon
      - run:
          name: Build Debug APK
          command: |
            export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
            ./gradlew :app:assembleDebug --stacktrace --no-daemon
          no_output_timeout: 20m
      - store_artifacts:
          path: app/build/outputs/apk/debug
          destination: apk
      - save_cache:
          paths:
            - ~/.gradle/caches
            - ~/.gradle/wrapper
          key: gradle-{{ checksum "gradle/wrapper/gradle-wrapper.properties" }}-{{ checksum "build.gradle" }}

  # DIAGNOSTIC JOB: Disables KAPT completely to expose the REAL error
  diagnose-kapt:
    executor:
      name: android/android-machine
      tag: 2024.01.1
      resource-class: large
    steps:
      - checkout
      - setup-java-17
      - run:
          name: Grant execute permission for gradlew
          command: chmod +x gradlew
      - run:
          name: Clean
          command: |
            export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
            ./gradlew clean --no-daemon
      - run:
          name: Compile :app Kotlin WITHOUT KAPT (reveals real error)
          command: |
            export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
            ./gradlew :app:compileDebugKotlin -PdisableKapt=true --no-daemon --stacktrace --info 2>&1 | tee diagnose.log
          no_output_timeout: 15m
      - store_artifacts:
          path: diagnose.log
          destination: diagnose-log

workflows:
  build-test-deploy:
    jobs:
      - build-test-deploy:
          filters:
            branches:
              only:
                - main
                - master
                - develop

  build-only:
    jobs:
      - build-only:
          filters:
            branches:
              ignore:
                - main
                - master
                - develop

  diagnose:
    jobs:
      - diagnose-kapt
