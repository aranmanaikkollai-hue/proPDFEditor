# CircleCI configuration for proPDFEditor Android project
# Uses Android Docker image with Java 17 (required for KAPT 1.9.20 compatibility)

version: 2.1

orbs:
  android: circleci/android@2.5.0

executors:
  android-executor:
    docker:
      - image: cimg/android:2024.04-ndk
    resource_class: large
    environment:
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      PATH: /usr/lib/jvm/java-17-openjdk-amd64/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      JVM_OPTS: -Xmx4096m
      GRADLE_OPTS: -Xmx4096m -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4096m -Dkotlin.compiler.execution.strategy=in-process

commands:
  setup-java-17:
    description: "Install and configure Java 17"
    steps:
      - run:
          name: Install OpenJDK 17
          command: |
            sudo apt-get update
            sudo apt-get install -y openjdk-17-jdk
            export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
            export PATH=$JAVA_HOME/bin:$PATH
            java -version

  setup-android:
    description: "Setup Android SDK"
    steps:
      - run:
          name: Accept Android Licenses
          command: yes | sdkmanager --licenses || true
      - run:
          name: Setup local.properties
          command: echo "sdk.dir=/opt/android/sdk" > local.properties

  gradle-cache:
    description: "Restore and save Gradle cache"
    steps:
      - restore_cache:
          keys:
            - v1-gradle-{{ checksum "build.gradle" }}-{{ checksum "gradle.properties" }}
            - v1-gradle-{{ checksum "build.gradle" }}
            - v1-gradle-
      - save_cache:
          paths:
            - ~/.gradle/caches
            - ~/.gradle/wrapper
          key: v1-gradle-{{ checksum "build.gradle" }}-{{ checksum "gradle.properties" }}

jobs:
  diagnose-kapt:
    executor: android-executor
    steps:
      - checkout
      - setup-java-17
      - setup-android
      - gradle-cache
      - run:
          name: Fix gradlew permissions
          command: chmod +x ./gradlew
      - run:
          name: Disable KAPT and compile to find real error
          command: |
            export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
            export PATH=$JAVA_HOME/bin:$PATH
            # Disable all KAPT tasks and compile Kotlin directly
            ./gradlew :app:compileDebugKotlin -Pkapt.incremental.apt=false -Pkapt.use.worker.api=false --no-daemon --stacktrace || true
      - store_artifacts:
          path: app/build/reports
          destination: diagnostic-reports

  build-and-test:
    executor: android-executor
    steps:
      - checkout
      - setup-java-17
      - setup-android
      - gradle-cache
      - run:
          name: Fix gradlew permissions
          command: chmod +x ./gradlew
      - run:
          name: Clean Build
          command: |
            export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
            export PATH=$JAVA_HOME/bin:$PATH
            ./gradlew clean --no-daemon
      - run:
          name: Build Debug APK
          command: |
            export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
            export PATH=$JAVA_HOME/bin:$PATH
            ./gradlew :app:assembleDebug --no-daemon --stacktrace
      - run:
          name: Run Unit Tests
          command: |
            export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
            export PATH=$JAVA_HOME/bin:$PATH
            ./gradlew testDebugUnitTest --no-daemon --stacktrace
      - store_test_results:
          path: app/build/test-results/testDebugUnitTest
      - store_artifacts:
          path: app/build/outputs/apk/debug
          destination: debug-apk

workflows:
  version: 2
  diagnose:
    jobs:
      - diagnose-kapt:
          filters:
            branches:
              only:
                - main
                - master
  build-test-deploy:
    jobs:
      - build-and-test:
          filters:
            branches:
              only:
                - main
                - master
                - develop
