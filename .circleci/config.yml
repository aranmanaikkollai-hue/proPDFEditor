# CircleCI configuration for proPDFEditor Android project
# Uses Android Docker image with Java 17
# Includes Gradle caching, clean build, unit tests, and APK artifact storage

version: 2.1

orbs:
  android: circleci/android@2.5.0

executors:
  android-executor:
    docker:
      - image: cimg/android:2024.04-ndk
    resource_class: large
    environment:
      JVM_OPTS: -Xmx4096m
      GRADLE_OPTS: -Xmx4096m -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4096m -Dkotlin.compiler.execution.strategy=in-process

commands:
  setup-android:
    description: "Setup Android SDK and accept licenses"
    steps:
      - run:
          name: Accept Android Licenses
          command: |
            yes | sdkmanager --licenses || true
      - run:
          name: Setup local.properties
          command: |
            echo "sdk.dir=/opt/android/sdk" > local.properties

  gradle-cache:
    description: "Restore and save Gradle cache"
    steps:
      - restore_cache:
          keys:
            - v1-gradle-{{ checksum "build.gradle" }}-{{ checksum "gradle.properties" }}
            - v1-gradle-{{ checksum "build.gradle" }}
            - v1-gradle-
      - save_cache:
          paths:
            - ~/.gradle/caches
            - ~/.gradle/wrapper
          key: v1-gradle-{{ checksum "build.gradle" }}-{{ checksum "gradle.properties" }}

jobs:
  build-and-test:
    executor: android-executor
    steps:
      - checkout
      - setup-android
      - gradle-cache
      - run:
          name: Fix gradlew permissions
          command: chmod +x ./gradlew
      - run:
          name: Clean Build
          command: ./gradlew clean --no-daemon
      - run:
          name: Build Debug APK
          command: ./gradlew :app:assembleDebug --no-daemon --stacktrace
      - run:
          name: Run Unit Tests
          command: ./gradlew testDebugUnitTest --no-daemon --stacktrace
      - store_test_results:
          path: app/build/test-results/testDebugUnitTest
      - store_test_results:
          path: core/build/test-results/testDebugUnitTest
      - store_test_results:
          path: editor/build/test-results/testDebugUnitTest
      - store_test_results:
          path: security/build/test-results/testDebugUnitTest
      - store_test_results:
          path: scanner/build/test-results/testDebugUnitTest
      - store_test_results:
          path: viewer/build/test-results/testDebugUnitTest
      - store_test_results:
          path: ocr/build/test-results/testDebugUnitTest
      - store_test_results:
          path: ads/build/test-results/testDebugUnitTest
      - store_test_results:
          path: annotations/build/test-results/testDebugUnitTest
      - store_artifacts:
          path: app/build/outputs/apk/debug
          destination: debug-apk
      - store_artifacts:
          path: app/build/reports
          destination: build-reports
      - store_artifacts:
          path: app/build/test-results
          destination: test-results

  build-only:
    executor: android-executor
    steps:
      - checkout
      - setup-android
      - gradle-cache
      - run:
          name: Fix gradlew permissions
          command: chmod +x ./gradlew
      - run:
          name: Clean Build
          command: ./gradlew clean --no-daemon
      - run:
          name: Build Debug APK
          command: ./gradlew :app:assembleDebug --no-daemon --stacktrace
      - store_artifacts:
          path: app/build/outputs/apk/debug
          destination: debug-apk

  diagnose-kapt:
    executor: android-executor
    steps:
      - checkout
      - setup-android
      - gradle-cache
      - run:
          name: Fix gradlew permissions
          command: chmod +x ./gradlew
      - run:
          name: Diagnose KAPT Error (disable KAPT to show real error)
          command: ./gradlew showRealErrors --no-daemon --stacktrace || true
      - store_artifacts:
          path: build/reports
          destination: diagnostic-reports

workflows:
  version: 2
  build-test-deploy:
    jobs:
      - build-and-test:
          filters:
            branches:
              only:
                - main
                - master
                - develop
      - build-only:
          filters:
            branches:
              ignore:
                - main
                - master
                - develop

  # Manual trigger for KAPT diagnosis
  diagnose:
    jobs:
      - diagnose-kapt
