version: 2.1

jobs:
  build:
    docker:
      - image: cimg/android:2024.01
    resource_class: large
    environment:
      JVM_OPTS: -Xmx4096m
      GRADLE_OPTS: -Xmx4096m -Dorg.gradle.daemon=false
    steps:
      - checkout
      - restore_cache:
          key: gradle-{{ checksum "build.gradle" }}-{{ checksum "app/build.gradle" }}
      - run:
          name: Grant execute permission for gradlew
          command: chmod +x gradlew
      - run:
          name: Build Debug
          command: ./gradlew clean :app:assembleDebug --no-daemon --stacktrace
      - save_cache:
          paths:
            - ~/.gradle
          key: gradle-{{ checksum "build.gradle" }}-{{ checksum "app/build.gradle" }}
      - store_artifacts:
          path: app/build/outputs/apk/debug
          destination: apk-debug

  diagnose-kapt:
    docker:
      - image: cimg/android:2024.01
    resource_class: large
    environment:
      JVM_OPTS: -Xmx4096m
      GRADLE_OPTS: -Xmx4096m -Dorg.gradle.daemon=false
    steps:
      - checkout
      - restore_cache:
          key: gradle-{{ checksum "build.gradle" }}-{{ checksum "app/build.gradle" }}
      - run:
          name: Grant execute permission for gradlew
          command: chmod +x gradlew
      - run:
          name: Clean build directories
          command: ./gradlew clean --no-daemon
      - run:
          name: Delete stale kotlin_module files
          command: |
            find . -path "*/build/tmp/kotlin-classes/*/META-INF/*.kotlin_module" -delete 2>/dev/null || true
            find . -path "*/build/intermediates/javac/*/classes/META-INF/*.kotlin_module" -delete 2>/dev/null || true
            echo "Cleaned stale .kotlin_module files"
      - run:
          name: Build library modules first
          command: |
            ./gradlew :core:compileDebugKotlin :viewer:compileDebugKotlin :editor:compileDebugKotlin :scanner:compileDebugKotlin :security:compileDebugKotlin :ads:compileDebugKotlin :ocr:compileDebugKotlin :annotations:compileDebugKotlin --no-daemon --stacktrace 2>&1 | tee diagnose.log
      - run:
          name: Build app module
          command: |
            ./gradlew :app:assembleDebug --no-daemon --stacktrace 2>&1 | tee -a diagnose.log
      - save_cache:
          paths:
            - ~/.gradle
          key: gradle-{{ checksum "build.gradle" }}-{{ checksum "app/build.gradle" }}
      - store_artifacts:
          path: diagnose.log
          destination: diagnose.log

workflows:
  version: 2
  build-and-test:
    jobs:
      - build:
          filters:
            branches:
              only: main
  diagnose:
    jobs:
      - diagnose-kapt:
          filters:
            branches:
              only: main
