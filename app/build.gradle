plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'org.jetbrains.kotlin.kapt'
    id 'com.google.dagger.hilt.android'
    id 'org.jetbrains.kotlin.plugin.parcelize'
    id 'org.jetbrains.kotlin.plugin.serialization' version '1.9.23'
}

android {
    compileSdk 34
    namespace 'com.propdf.editor'

    defaultConfig {
        applicationId "com.propdf.editor"
        minSdk 26  // Apache POI 5.2.5 / log4j-api 2.21.1 use invokedynamic string
                   // concatenation (Java 9+ bytecode) that D8 cannot desugar below
                   // API 26 - "Error while dexing. Increase the minSdkVersion to 26
                   // or above." This matches Apache POI's own official Android
                   // sample project (centic9/poi-on-android), which also requires
                   // minSdk 26 for the same reason.
        targetSdk 34
        versionCode 3
        versionName "3.0.0"
        multiDexEnabled true
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        debug {
            minifyEnabled false
            debuggable true
        }
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    buildFeatures {
        compose true
        viewBinding true
        buildConfig true
    }

    composeOptions {
        kotlinCompilerExtensionVersion '1.5.12'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    packagingOptions {
        resources {
            excludes += [
                'META-INF/DEPENDENCIES',
                'META-INF/LICENSE',
                'META-INF/NOTICE',
                'META-INF/*.kotlin_module',
                'META-INF/INDEX.LIST',
                'META-INF/io.netty.versions.properties',
                'META-INF/BCKEY.DSA',
                'META-INF/BCKEY.SF'
            ]
        }
    }
}

configurations.all {
    resolutionStrategy {
        force 'org.bouncycastle:bcprov-jdk15to18:1.72'
        force 'org.bouncycastle:bcpkix-jdk15to18:1.72'
    }
}

dependencies {
    // Feature modules
    implementation project(':core')
    implementation project(':viewer')
    implementation project(':editor')
    implementation project(':annotations')
    implementation project(':scanner')
    implementation project(':security')
    implementation project(':ads')
    // BootReceiver re-schedules backup/folder-watch work and imports these directly;
    // they were missing here, which would fail :app's Kotlin compile with
    // "unresolved reference" for com.propdf.backup.* / com.propdf.sync.* as soon as
    // the manifest-merge step above got past.
    implementation project(':backup')
    implementation project(':sync')

    // AndroidX
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    implementation 'androidx.fragment:fragment-ktx:1.6.2'
    implementation 'androidx.activity:activity-ktx:1.8.2'
    implementation 'androidx.multidex:multidex:2.0.1'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-livedata-ktx:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
    implementation 'androidx.coordinatorlayout:coordinatorlayout:1.2.0'
    implementation 'androidx.core:core-splashscreen:1.0.1'
    // AutoRenameDocumentUseCase.kt and StorageManager.kt import
    // androidx.documentfile.provider.DocumentFile directly. :core/:storage/:sync/
    // :backup only declare this as `implementation` (non-transitive), so it never
    // reaches :app's own compile classpath - causing an unresolved-reference Kotlin
    // compile error in :app that surfaces as the generic kapt
    // "Could not load module <Error module>" error instead of a real diagnostic.
    implementation 'androidx.documentfile:documentfile:1.0.1'

    // Jetpack Compose BOM - :app's own UI (MainActivity, HomeScreen, ToolsScreen,
    // FilesScreen, PdfViewerScreen, SettingsScreen, etc.) is built entirely with
    // @Composable functions, but these libraries were never declared here.
    implementation platform('androidx.compose:compose-bom:2024.02.00')
    implementation 'androidx.compose.ui:ui'
    implementation 'androidx.compose.ui:ui-graphics'
    implementation 'androidx.compose.ui:ui-tooling-preview'
    implementation 'androidx.compose.material3:material3'
    implementation 'androidx.compose.material:material-icons-extended'
    implementation 'androidx.compose.runtime:runtime'
    implementation 'androidx.compose.foundation:foundation'
    implementation 'androidx.compose.animation:animation'
    debugImplementation 'androidx.compose.ui:ui-tooling'

    // Activity Compose (setContent, rememberLauncherForActivityResult in MainActivity)
    implementation 'androidx.activity:activity-compose:1.8.2'

    // Navigation Compose (NavHost/composable/rememberNavController in MainActivity)
    implementation 'androidx.navigation:navigation-compose:2.7.6'

    // Hilt + Compose Navigation (hiltViewModel() used throughout the ui/ screens)
    implementation 'androidx.hilt:hilt-navigation-compose:1.1.0'

    // Lifecycle Compose (collectAsStateWithLifecycle used in ViewModels/screens)
    implementation 'androidx.lifecycle:lifecycle-runtime-compose:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-compose:2.7.0'

    // DataStore Preferences (SettingsDataStore.kt)
    implementation 'androidx.datastore:datastore-preferences:1.0.0'

    // App Startup (WorkManagerInitializer.kt implements androidx.startup.Initializer)
    implementation 'androidx.startup:startup-runtime:1.1.1'

    // Room
    implementation 'androidx.room:room-runtime:2.6.1'
    implementation 'androidx.room:room-ktx:2.6.1'
    kapt 'androidx.room:room-compiler:2.6.1'

    // Hilt
    implementation 'com.google.dagger:hilt-android:2.50'
    kapt 'com.google.dagger:hilt-compiler:2.50'
    implementation 'androidx.hilt:hilt-work:1.1.0'
    kapt 'androidx.hilt:hilt-compiler:1.1.0'

    // WorkManager
    implementation 'androidx.work:work-runtime-ktx:2.9.0'

    // Coroutines
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'

    // Serialization (SmartFolderEngine.kt, PageEditorViewModel.kt use @Serializable/Json)
    implementation 'org.jetbrains.kotlinx:kotlinx-serialization-json:1.6.2'

    // PDF
    implementation('com.itextpdf:itext7-core:7.2.5') {
        exclude group: 'org.bouncycastle', module: 'bcprov-jdk15on'
        exclude group: 'org.bouncycastle', module: 'bcpkix-jdk15on'
    }
    implementation 'com.tom-roush:pdfbox-android:2.0.27.0'
    implementation 'org.bouncycastle:bcprov-jdk15to18:1.72'
    implementation 'org.bouncycastle:bcpkix-jdk15to18:1.72'

    // CameraX
    implementation 'androidx.camera:camera-core:1.3.1'
    implementation 'androidx.camera:camera-camera2:1.3.1'
    implementation 'androidx.camera:camera-lifecycle:1.3.1'
    implementation 'androidx.camera:camera-view:1.3.1'
    // CameraX pulls in com.google.guava:listenablefuture:1.0, a binary-compatibility
    // stub with no real class bodies. Real guava (which module-replaces the stub)
    // is needed since DocumentScannerActivity/ModernScannerActivity call
    // ListenableFuture.addListener()/.get() directly.
    implementation 'com.google.guava:guava:31.1-android'

    // ML Kit — OFFLINE Text Recognition v2 (bundled models)
    implementation 'com.google.mlkit:text-recognition:16.0.1'
    implementation 'com.google.mlkit:text-recognition-devanagari:16.0.1'
    implementation 'com.google.mlkit:text-recognition-japanese:16.0.1'
    implementation 'com.google.mlkit:text-recognition-korean:16.0.1'
    implementation 'com.google.mlkit:text-recognition-chinese:16.0.1'

    // Gson
    implementation 'com.google.code.gson:gson:2.10.1'

    // Tests
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'

    // Leak detection (debug only)
    debugImplementation 'com.squareup.leakcanary:leakcanary-android:2.13'
}

// Fixes kapt "Could not load module <Error module>" (KT-70718: kapt reports this
// generic error instead of a real diagnostic when it hits an error/unresolved type
// while generating stubs for a data class component - common in multi-module Hilt
// setups where kapt has to resolve types across module boundaries). No fix exists
// in the 1.9.x compiler line, so correctErrorTypes tells kapt to resolve the real
// type from source instead of substituting its NonExistentClass placeholder.
kapt {
    correctErrorTypes = true
}
