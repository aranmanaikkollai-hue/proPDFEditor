# Project-wide Gradle settings.
# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE *will override*
# any settings specified in this file.
# For more details on how to configure your build environment visit
# http://www.gradle.org/docs/current/userguide/build_environment.html

# Specifies the JVM arguments used for the daemon process.
# The setting is particularly useful for tweaking memory settings.
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8

# When configured, Gradle will run in incubating parallel mode.
# This option should only be used with decoupled projects. More details, visit
# http://www.gradle.org/docs/current/userguide/multi_project_builds.html#sec:decoupled_projects
# DISABLED: parallel module compilation is the last remaining suspect for the
# intermittent ":app:kaptGenerateStubsDebugKotlin" / "Could not load module
# <Error module>" failure. Neither aligning the Kotlin plugin version (KT-53478,
# fixed in 1.9.23) nor forcing in-process kapt execution
# (kotlin.compiler.execution.strategy=in-process, kapt.use.worker.api=false,
# both below) stopped it from recurring, which rules out both the known
# compiler bug and Kotlin-daemon session caching as the cause. With 14 modules
# compiling concurrently, :app's kapt stub generation reads compiled output
# from every dependency module while some of those modules may still be
# mid-compile on other threads. Serializing module compilation removes that
# possibility entirely. This will slow the build down; if this resolves the
# error, parallel execution can be selectively re-enabled later once isolated.
org.gradle.parallel=false

# AndroidX package structure to make it clearer which packages are bundled with the
# Android operating system, and which are packaged with your app's APK
# https://developer.android.com/topic/libraries/support-library/androidx-rn
android.useAndroidX=true

# Kotlin code style for this project: "official" or "obsolete":
kotlin.code.style=official

# Force Kotlin compilation to run in-process instead of via the shared Kotlin
# compiler daemon. codemagic.yaml already passes
# -Dkotlin.compiler.execution.strategy=in-process via GRADLE_OPTS, but that's a
# bare JVM system property and the Kotlin Gradle Plugin does not reliably read
# it that way for kapt's stub-generation task - the build log confirms
# kaptGenerateStubsDebugKotlin was still connecting to a long-lived Kotlin
# daemon shared across all 14 modules ("found daemon on port ..., trying to
# connect"). Setting it here as an actual Gradle project property is the
# documented, reliable mechanism. Combined with kapt.use.worker.api=false
# below, kapt no longer touches that shared daemon at all, which is the
# suspected trigger for the intermittent "Could not load module <Error
# module>" kapt failure in this multi-module build.
kotlin.compiler.execution.strategy=in-process
kapt.use.worker.api=false

# Enables namespacing of each library's R class so that its R class includes only the
# resources declared in the library itself and none from the library's dependencies,
# thereby reducing the size of the R class for that library
android.nonTransitiveRClass=true
