format_version: "13"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

project_type: android

workflows:
  run_tests:
    steps:
    - activate-ssh-key@4: {}
    - git-clone@8: {}
    - restore-gradle-cache@3: {}
    - install-missing-android-tools@3: {}
    - script@1:
        title: Clean Build
        inputs:
        - content: |
            #!/bin/bash
            set -ex
            ./gradlew clean --no-daemon
    - android-unit-test@1:
        inputs:
        - project_location: $BITRISE_SOURCE_DIR
    - android-build@1:
        inputs:
        - project_location: $BITRISE_SOURCE_DIR
        - module: app
        - variant: debug
    - save-gradle-cache@1: {}
    - deploy-to-bitrise-io@2: {}

  build_apk:
    steps:
    - activate-ssh-key@4: {}
    - git-clone@8: {}
    - restore-gradle-cache@3: {}
    - install-missing-android-tools@3: {}
    - script@1:
        title: Clean Build
        inputs:
        - content: |
            #!/bin/bash
            set -ex
            ./gradlew clean --no-daemon
    - android-build@1:
        inputs:
        - project_location: $BITRISE_SOURCE_DIR
        - module: app
        - variant: debug
    - save-gradle-cache@1: {}
    - deploy-to-bitrise-io@2: {}
