# FILE: codemagic.yaml
# VERSION: 4.6 (Aggressive XML Sanitizer & Identity Fix)
# RECTIFIES: XMLScanner.scanComment crash and Step 1 Exit Code 1

workflows:
  android-debug:
    name: ProPDF Editor - Debug APK v4.1
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Step 1 - Project Structure & XML Repair
        script: |
          set -e

          # 1. Create mandatory directory tree
          mkdir -p app/src/main/java/com/propdf/editor/di
          mkdir -p app/src/main/java/com/propdf/editor/ui/viewer
          mkdir -p app/src/main/java/com/propdf/editor/ui/scanner
          mkdir -p app/src/main/java/com/propdf/editor/ui/tools
          mkdir -p app/src/main/java/com/propdf/editor/data/repository
          mkdir -p app/src/main/java/com/propdf/editor/data/local
          mkdir -p app/src/main/java/com/propdf/editor/utils
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/menu
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

          # 2. DYNAMIC WRAPPER FIX
          # Find gradle-wrapper.jar anywhere and move it to the required path
          echo "Locating gradle-wrapper.jar..."
          WRAPPER_SRC=$(find . -name "gradle-wrapper.jar" | grep -v "gradle/wrapper" | head -n 1)
          if [ -n "$WRAPPER_SRC" ]; then
            cp "$WRAPPER_SRC" gradle/wrapper/gradle-wrapper.jar
          fi

          # 3. CRITICAL: MANIFEST SANITIZER (Fixes XMLScanner.scanComment)
          # This removes ALL comments and suspicious double-dashes that crash the parser.
          if [ -f "AndroidManifest.xml" ]; then
            echo "Repairing Manifest XML syntax..."
            sed -e 's///g' -e '//d' AndroidManifest.xml > app/src/main/AndroidManifest.xml
          fi

          # 4. SMART CONFIG COPY (Avoids "Identical File" Error)
          # Only copy if the destination is a DIFFERENT path than the source.
          [ -f "app_build.gradle" ] && cp app_build.gradle app/build.gradle
          [ -f "gradle-wrapper.properties" ] && cp gradle-wrapper.properties gradle/wrapper/
          [ -f "proguard-rules.pro" ] && cp proguard-rules.pro app/
          
          # 5. KOTLIN SOURCE MAPPING
          # Pulls the newest v4.1 files from root into the package folders.
          find . -maxdepth 1 -name "OcrManager.kt" -exec cp {} app/src/main/java/com/propdf/editor/data/repository/ \;
          find . -maxdepth 1 -name "PdfRedactionManager.kt" -exec cp {} app/src/main/java/com/propdf/editor/data/repository/ \;
          find . -maxdepth 1 -name "AppShortcutsHelper.kt" -exec cp {} app/src/main/java/com/propdf/editor/utils/ \;
          find . -maxdepth 1 -name "TextReflowActivity.kt" -exec cp {} app/src/main/java/com/propdf/editor/ui/viewer/ \;
          find . -maxdepth 1 -name "DocumentScannerActivity.kt" -exec cp {} app/src/main/java/com/propdf/editor/ui/scanner/ \;
          find . -maxdepth 1 -name "ScanSaveActivity.kt" -exec cp {} app/src/main/java/com/propdf/editor/ui/scanner/ \;
          
          echo "✅ Project prepared. XML comments stripped."

      - name: Step 2 - Resource Generation
        script: |
          if [ -f "setup_project.py" ]; then
            python3 setup_project.py
          fi

      - name: Step 3 - Set Execution Permissions
        script: chmod +x gradlew

      - name: Step 4 - Build Debug APK
        script: |
          export GRADLE_OPTS="-Xmx3g"
          ./gradlew :app:assembleDebug --no-daemon --stacktrace

    artifacts:
      - app/build/outputs/apk/**/*.apk

    publishing:
      email:
        recipients:
          - aranmanaikkollai@gmail.com  # Please update this
        notify:
          success: true
          failure: true
