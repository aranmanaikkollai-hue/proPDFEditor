# ============================================================
#  codemagic.yaml — ProPDF Editor
#  FIXED: Creates correct folder structure from flat repo
# ============================================================

workflows:
  android-debug-build:
    name: ProPDF Editor - Build APK
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      java: 17

    scripts:

      - name: Show current file structure
        script: |
          echo "=== Files in repo root ==="
          ls -la
          echo ""
          echo "=== Looking for app folder ==="
          ls -la app/ 2>/dev/null || echo "No app/ folder found"

      - name: Fix folder structure
        script: |
          mkdir -p app/src/main/java/com/propdf/editor/ui/viewer
          mkdir -p app/src/main/java/com/propdf/editor/ui/scanner
          mkdir -p app/src/main/java/com/propdf/editor/data/repository
          mkdir -p app/src/main/java/com/propdf/editor/data/local
          mkdir -p app/src/main/java/com/propdf/editor/data/model
          mkdir -p app/src/main/java/com/propdf/editor/di
          mkdir -p app/src/main/java/com/propdf/editor/utils
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/menu
          mkdir -p app/src/main/res/xml
          mkdir -p gradle/wrapper

          [ -f "app_build.gradle" ] && mv app_build.gradle app/build.gradle && echo "Moved app_build.gradle"

          for f in ProPDFApp.kt; do
            [ -f "$f" ] && mv "$f" app/src/main/java/com/propdf/editor/ && echo "Moved $f"
          done
          for f in ViewerActivity.kt AnnotationCanvasView.kt; do
            [ -f "$f" ] && mv "$f" app/src/main/java/com/propdf/editor/ui/viewer/ && echo "Moved $f"
          done
          for f in DocumentScannerActivity.kt; do
            [ -f "$f" ] && mv "$f" app/src/main/java/com/propdf/editor/ui/scanner/ && echo "Moved $f"
          done
          for f in PdfOperationsManager.kt OcrManager.kt ScannerProcessor.kt; do
            [ -f "$f" ] && mv "$f" app/src/main/java/com/propdf/editor/data/repository/ && echo "Moved $f"
          done
          [ -f "ProPDFDatabase.kt" ] && mv ProPDFDatabase.kt app/src/main/java/com/propdf/editor/data/local/
          [ -f "Models.kt" ] && mv Models.kt app/src/main/java/com/propdf/editor/data/model/
          [ -f "AppModule.kt" ] && mv AppModule.kt app/src/main/java/com/propdf/editor/di/
          [ -f "PermissionUtils.kt" ] && mv PermissionUtils.kt app/src/main/java/com/propdf/editor/utils/
          [ -f "AndroidManifest.xml" ] && mv AndroidManifest.xml app/src/main/
          [ -f "gradle-wrapper.properties" ] && mv gradle-wrapper.properties gradle/wrapper/

          echo "=== Final structure ==="
          find . -not -path './.git/*' -type f | sort

      - name: Download gradle-wrapper.jar
        script: |
          curl -L "https://services.gradle.org/distributions/gradle-8.2-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          ls -lh gradle/wrapper/gradle-wrapper.jar

      - name: Create stub fragments and nav graph
        script: |
          [ ! -f "app/proguard-rules.pro" ] && echo "# ProGuard" > app/proguard-rules.pro

          mkdir -p app/src/main/res/navigation
          cat > app/src/main/res/navigation/nav_graph.xml << 'NAVEOF'
<?xml version="1.0" encoding="utf-8"?>
<navigation xmlns:android="http://schemas.android.com/apk/res/android"
    xmlns:app="http://schemas.android.com/apk/res-auto"
    android:id="@+id/nav_graph"
    app:startDestination="@id/homeFragment">
    <fragment android:id="@+id/homeFragment"
        android:name="com.propdf.editor.ui.HomeFragment"
        android:label="Home" />
    <fragment android:id="@+id/filesFragment"
        android:name="com.propdf.editor.ui.FilesFragment"
        android:label="Files" />
    <fragment android:id="@+id/cloudFragment"
        android:name="com.propdf.editor.ui.CloudFragment"
        android:label="Cloud" />
    <fragment android:id="@+id/settingsFragment"
        android:name="com.propdf.editor.ui.SettingsFragment"
        android:label="Settings" />
</navigation>
NAVEOF

          FRAGS_DIR="app/src/main/java/com/propdf/editor/ui"
          mkdir -p "$FRAGS_DIR"
          for FRAG in HomeFragment FilesFragment CloudFragment SettingsFragment; do
            FILE="$FRAGS_DIR/${FRAG}.kt"
            if [ ! -f "$FILE" ]; then
              cat > "$FILE" << FRAGEOF
package com.propdf.editor.ui
import android.os.Bundle; import android.view.*; import android.widget.TextView; import androidx.fragment.app.Fragment
class ${FRAG} : Fragment() {
    override fun onCreateView(i: LayoutInflater, c: ViewGroup?, s: Bundle?) = TextView(requireContext()).apply { text = "${FRAG}" } as View
}
FRAGEOF
            fi
          done
          echo "Stubs created"

      - name: Set permissions
        script: chmod +x gradlew

      - name: Build Debug APK
        script: |
          ./gradlew :app:assembleDebug \
            --stacktrace \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=512m"

    artifacts:
      - app/build/outputs/apk/debug/**.apk

    publishing:
      email:
        recipients:
          - your@gmail.com
        notify:
          success: true
          failure: true
