workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      groups:
        - android_credentials
      vars:
        GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g -Dkotlin.compiler.execution.strategy=in-process"
      java: 17
    cache:
      cache_paths:
        - $CM_BUILD_DIR/.gradle
        - $HOME/.gradle/caches
    scripts:
      - name: Fix gradlew permissions
        script: |
          cd "$CM_BUILD_DIR"
          chmod +x ./gradlew
          echo "gradlew permissions fixed"
      - name: Set up local.properties
        script: |
          cd "$CM_BUILD_DIR"
          echo "sdk.dir=/usr/local/share/android-sdk" > "$CM_BUILD_DIR/local.properties"
      - name: Build Debug APK
        script: |
          cd "$CM_BUILD_DIR"
          # NOTE: clean and assembleDebug are run as two separate invocations,
          # not "./gradlew clean :app:assembleDebug" in one command. With
          # org.gradle.parallel=true, combining them in a single invocation
          # hits a known Gradle race condition (gradle/gradle#15163): while
          # clean is still deleting a module's build output on one executor,
          # another executor can start a dependent task (like :app's kapt
          # stub generation) that reads those same files mid-deletion. That
          # produces exactly the intermittent "Could not load module
          # <Error module>" kapt failure seen in these builds. Running clean
          # to completion in its own invocation before the build starts
          # eliminates the race.
          ./gradlew clean --no-daemon
          ./gradlew :app:assembleDebug --stacktrace --no-daemon
    artifacts:
      - app/build/outputs/**/*.apk
