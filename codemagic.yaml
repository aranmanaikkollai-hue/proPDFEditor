# FILE: codemagic.yaml
# VERSION: 4.3 (Manifest & Path Correction)
# PURPOSE: Fixes "Identical File" crash and Manifest parsing errors

workflows:
  android-debug:
    name: ProPDF Editor - Debug APK v4.1
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Step 1 - Project Structure & Dynamic Wrapper Discovery
        script: |
          set -e

          # 1. Create the mandatory Android directory tree
          mkdir -p app/src/main/java/com/propdf/editor/di
          mkdir -p app/src/main/java/com/propdf/editor/ui/viewer
          mkdir -p app/src/main/java/com/propdf/editor/ui/scanner
          mkdir -p app/src/main/java/com/propdf/editor/ui/tools
          mkdir -p app/src/main/java/com/propdf/editor/data/repository
          mkdir -p app/src/main/java/com/propdf/editor/data/local
          mkdir -p app/src/main/java/com/propdf/editor/utils
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/menu
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

          # 2. DYNAMIC WRAPPER SEARCH (Fix for ClassNotFoundException)
          echo "Locating gradle-wrapper.jar..."
          # Find the jar but exclude the destination folder to avoid loops
          WRAPPER_SRC=$(find . -name "gradle-wrapper.jar" | grep -v "gradle/wrapper" | head -n 1)
          if [ -n "$WRAPPER_SRC" ]; then
            cp "$WRAPPER_SRC" gradle/wrapper/gradle-wrapper.jar
            echo "✅ Wrapper moved to gradle/wrapper/"
          fi

          # 3. CONFIG FILES (Using forced paths to avoid "identical file" errors)
          # We copy FROM the root TO the specific app subfolders
          [ -f "app_build.gradle" ] && cp app_build.gradle app/build.gradle
          [ -f "AndroidManifest.xml" ] && cp AndroidManifest.xml app/src/main/AndroidManifest.xml
          [ -f "gradle-wrapper.properties" ] && cp gradle-wrapper.properties gradle/wrapper/
          
          # 4. KOTLIN SOURCE MAPPING
          # This pulls files from the flat root and puts them in the correct package folders
          # The -maxdepth 1 prevents it from trying to copy files already in subfolders
          find . -maxdepth 1 -name "OcrManager.kt" -exec cp {} app/src/main/java/com/propdf/editor/data/repository/ \;
          find . -name "PdfRedactionManager.kt" -exec cp {} app/src/main/java/com/propdf/editor/data/repository/ \;
          find . -name "AppShortcutsHelper.kt" -exec cp {} app/src/main/java/com/propdf/editor/utils/ \;
          find . -name "TextReflowActivity.kt" -exec cp {} app/src/main/java/com/propdf/editor/ui/viewer/ \;
          find . -name "DocumentScannerActivity.kt" -exec cp {} app/src/main/java/com/propdf/editor/ui/scanner/ \;
          find . -name "ScanSaveActivity.kt" -exec cp {} app/src/main/java/com/propdf/editor/ui/scanner/ \;
          
          echo "✅ Directory structure prepared."

      - name: Step 2 - Resource Generation
        script: |
          if [ -f "setup_project.py" ]; then
            python3 setup_project.py
          fi

      - name: Step 3 - Set Execution Permissions
        script: chmod +x gradlew

      - name: Step 4 - Build Debug APK
        script: |
          # Increased memory and stacktrace for manifest debugging
          export GRADLE_OPTS="-Xmx3g"
          ./gradlew :app:assembleDebug --no-daemon --stacktrace

    artifacts:
      - app/build/outputs/apk/**/*.apk

    publishing:
      email:
        recipients:
          - aranmanaikkollai@gmail.com
        notify:
          success: true
          failure: true
