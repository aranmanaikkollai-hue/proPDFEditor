workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      groups:
        - android_credentials
      vars:
        GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g -Dkotlin.compiler.execution.strategy=in-process"
      java: 17
    cache:
      cache_paths:
        - $CM_BUILD_DIR/.gradle
        - $HOME/.gradle/caches
    scripts:
      - name: Fix gradlew permissions
        script: |
          cd "$CM_BUILD_DIR"
          chmod +x ./gradlew
          echo "gradlew permissions fixed"
      - name: Set up local.properties
        script: |
          cd "$CM_BUILD_DIR"
          echo "sdk.dir=/usr/local/share/android-sdk" > "$CM_BUILD_DIR/local.properties"
      - name: Build Debug APK
        script: |
          cd "$CM_BUILD_DIR"
          ./gradlew clean :app:assembleDebug --stacktrace --no-daemon
    artifacts:
      - app/build/outputs/**/*.apk
