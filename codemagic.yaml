workflows:
  android-debug-build:
    name: ProPDF Editor - Build APK
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      java: 17
    scripts:
      - name: Fix folder structure
        script: |
          mkdir -p app/src/main/java/com/propdf/editor/ui/viewer
          mkdir -p app/src/main/java/com/propdf/editor/ui/scanner
          mkdir -p app/src/main/java/com/propdf/editor/data/repository
          mkdir -p app/src/main/java/com/propdf/editor/data/local
          mkdir -p app/src/main/java/com/propdf/editor/data/model
          mkdir -p app/src/main/java/com/propdf/editor/di
          mkdir -p app/src/main/java/com/propdf/editor/utils
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/menu
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/navigation
          mkdir -p gradle/wrapper
          [ -f "app_build.gradle" ] && mv app_build.gradle app/build.gradle
          [ -f "ProPDFApp.kt" ] && mv ProPDFApp.kt app/src/main/java/com/propdf/editor/
          [ -f "ViewerActivity.kt" ] && mv ViewerActivity.kt app/src/main/java/com/propdf/editor/ui/viewer/
          [ -f "AnnotationCanvasView.kt" ] && mv AnnotationCanvasView.kt app/src/main/java/com/propdf/editor/ui/viewer/
          [ -f "DocumentScannerActivity.kt" ] && mv DocumentScannerActivity.kt app/src/main/java/com/propdf/editor/ui/scanner/
          [ -f "PdfOperationsManager.kt" ] && mv PdfOperationsManager.kt app/src/main/java/com/propdf/editor/data/repository/
          [ -f "OcrManager.kt" ] && mv OcrManager.kt app/src/main/java/com/propdf/editor/data/repository/
          [ -f "ScannerProcessor.kt" ] && mv ScannerProcessor.kt app/src/main/java/com/propdf/editor/data/repository/
          [ -f "ProPDFDatabase.kt" ] && mv ProPDFDatabase.kt app/src/main/java/com/propdf/editor/data/local/
          [ -f "Models.kt" ] && mv Models.kt app/src/main/java/com/propdf/editor/data/model/
          [ -f "AppModule.kt" ] && mv AppModule.kt app/src/main/java/com/propdf/editor/di/
          [ -f "PermissionUtils.kt" ] && mv PermissionUtils.kt app/src/main/java/com/propdf/editor/utils/
          [ -f "AndroidManifest.xml" ] && mv AndroidManifest.xml app/src/main/
          [ -f "gradle-wrapper.properties" ] && mv gradle-wrapper.properties gradle/wrapper/
          [ ! -f "app/proguard-rules.pro" ] && echo "# ProGuard" > app/proguard-rules.pro
          echo "=== Done moving files ==="
          find . -not -path './.git/*' -type f | sort

      - name: Download gradle-wrapper.jar
        script: |
          curl -L "https://services.gradle.org/distributions/gradle-8.2-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
          ls -lh gradle/wrapper/gradle-wrapper.jar

      - name: Create nav graph
        script: |
          python3 - << 'PYEOF'
          content = '''<?xml version="1.0" encoding="utf-8"?>
          <navigation xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:id="@+id/nav_graph"
              app:startDestination="@id/homeFragment">
              <fragment android:id="@+id/homeFragment" android:name="com.propdf.editor.ui.HomeFragment" android:label="Home" />
              <fragment android:id="@+id/filesFragment" android:name="com.propdf.editor.ui.FilesFragment" android:label="Files" />
              <fragment android:id="@+id/cloudFragment" android:name="com.propdf.editor.ui.CloudFragment" android:label="Cloud" />
              <fragment android:id="@+id/settingsFragment" android:name="com.propdf.editor.ui.SettingsFragment" android:label="Settings" />
          </navigation>'''
          with open('app/src/main/res/navigation/nav_graph.xml', 'w') as f:
              f.write(content)
          print("nav_graph.xml created")
          PYEOF

      - name: Create stub fragments
        script: |
          python3 - << 'PYEOF'
          import os
          frags_dir = "app/src/main/java/com/propdf/editor/ui"
          os.makedirs(frags_dir, exist_ok=True)
          for frag in ["HomeFragment", "FilesFragment", "CloudFragment", "SettingsFragment"]:
              path = os.path.join(frags_dir, frag + ".kt")
              if not os.path.exists(path):
                  with open(path, 'w') as f:
                      f.write(f"""package com.propdf.editor.ui
          import android.os.Bundle
          import android.view.*
          import android.widget.TextView
          import androidx.fragment.app.Fragment
          class {frag} : Fragment() {{
              override fun onCreateView(i: LayoutInflater, c: ViewGroup?, s: Bundle?) =
                  TextView(requireContext()).apply {{ text = "{frag}" }} as View
          }}
          """)
                  print(f"Created {frag}.kt")
          PYEOF

      - name: Set permissions
        script: chmod +x gradlew

      - name: Build Debug APK
        script: |
          ./gradlew :app:assembleDebug \
            --stacktrace \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=512m"

    artifacts:
      - app/build/outputs/apk/debug/**.apk

    publishing:
      email:
        recipients:
          - your@gmail.com
        notify:
          success: true
          failure: true
