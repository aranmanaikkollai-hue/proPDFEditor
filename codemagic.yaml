workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      groups:
        - android_credentials
      vars:
        GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g -Dkotlin.compiler.execution.strategy=in-process"
      java: 17
    scripts:
      - name: Verify gradlew exists
        script: |
          cd "$CM_BUILD_DIR"
          if [ ! -f "./gradlew" ]; then
            echo "ERROR: gradlew not found in $CM_BUILD_DIR"
            ls -la "$CM_BUILD_DIR"
            exit 1
          fi
          chmod +x ./gradlew
          echo "gradlew found and made executable"
      - name: Set up local.properties
        script: |
          cd "$CM_BUILD_DIR"
          echo "flutter.sdk=$HOME/programs/flutter" > "$CM_BUILD_DIR/local.properties"
          echo "sdk.dir=/usr/local/share/android-sdk" >> "$CM_BUILD_DIR/local.properties"
      - name: Build Debug APK
        script: |
          cd "$CM_BUILD_DIR"
          ./gradlew :app:assembleDebug --stacktrace --no-daemon
    artifacts:
      - app/build/outputs/**/*.apk
